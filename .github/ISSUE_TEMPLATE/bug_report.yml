name: Bug Report
description: Create a report to help us improve ReMastera
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: dropdown
    id: macos-version
    attributes:
      label: macOS Version
      options:
        - macOS 15.0 (Sequoia)
        - macOS 14.x (Sonoma)
    validations:
      required: true
  - type: input
    id: hardware
    attributes:
      label: Mac Hardware
      description: What Mac are you using? (e.g. M1 Pro MacBook Pro)
    validations:
      required: true
