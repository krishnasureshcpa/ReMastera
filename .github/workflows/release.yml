name: Release macOS App

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  package:
    name: Package ReMastera.app
    runs-on: macos-14
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Swift
      uses: swift-actions/setup-swift@v2
      with:
        swift-version: '6.0'
        
    - name: Build and Package App Bundle
      run: |
        chmod +x ./scripts/package.sh
        ./scripts/package.sh
        
    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: build/Dist/ReMastera-macOS.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
